name: "🎵 TikTok Downloader – Auto Proxy"

on:
  workflow_dispatch:
    inputs:
      tiktok_user:
        description: '👤 نام کاربری تیک‌تاک (عمومی)'
        required: true
        type: string
      max_videos:
        description: '🔢 تعداد ویدیوها (حداکثر ۲۰)'
        required: true
        default: '5'
        type: choice
        options: ['1', '3', '5', '10', '20']
      custom_proxy:
        description: '🌐 پروکسی دستی (مثال http://1.2.3.4:8080)'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  tiktok-auto-proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 نصب ابزارها
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg curl python3-pip
          pip3 install -q yt-dlp

      - name: 🛡️ دریافت پروکسی (دستی یا خودکار)
        run: |
          if [ -n "$CUSTOM_PROXY" ]; then
            echo "🔹 استفاده از پروکسی دستی: $CUSTOM_PROXY"
            echo "PROXY_URL=$CUSTOM_PROXY" >> $GITHUB_ENV
            exit 0
          fi

          echo "🔍 جستجوی پروکسی رایگان..."

          # دریافت لیست پروکسی‌ها از یک API عمومی
          PROXY_LIST=$(curl -s --max-time 10 "https://api.proxyscrape.com/v2/?request=displayproxies&protocol=http&timeout=5000&country=all&ssl=all&anonymity=all" | head -20)

          if [ -z "$PROXY_LIST" ]; then
            # منبع دوم
            PROXY_LIST=$(curl -s --max-time 10 "https://raw.githubusercontent.com/TheSpeedX/SOCKS-List/master/http.txt" | head -20)
          fi

          if [ -z "$PROXY_LIST" ]; then
            echo "❌ هیچ پروکسی‌ای یافت نشد. لطفاً یک پروکسی دستی وارد کنید."
            echo "PROXY_URL=none" >> $GITHUB_ENV
            exit 1
          fi

          # تست پروکسی‌ها و انتخاب اولین پروکسی سالم
          SELECTED=""
          while IFS= read -r proxy; do
            [ -z "$proxy" ] && continue
            echo "  تست $proxy ..."
            if curl -x "$proxy" -s --max-time 5 "https://www.tiktok.com" -o /dev/null -w "%{http_code}" | grep -q 200; then
              SELECTED="$proxy"
              echo "  ✅ انتخاب شد: $proxy"
              break
            fi
          done <<< "$PROXY_LIST"

          if [ -z "$SELECTED" ]; then
            echo "❌ هیچ پروکسی‌ای کار نکرد. لطفاً یک پروکسی دستی وارد کنید."
            echo "PROXY_URL=none" >> $GITHUB_ENV
            exit 1
          fi

          echo "PROXY_URL=$SELECTED" >> $GITHUB_ENV
        env:
          CUSTOM_PROXY: ${{ github.event.inputs.custom_proxy }}

      - name: 📥 دانلود ویدیوهای کاربر (با پروکسی)
        if: env.PROXY_URL != 'none'
        env:
          USER: ${{ github.event.inputs.tiktok_user }}
          MAX: ${{ github.event.inputs.max_videos }}
        run: |
          set -euo pipefail
          TARGET_DIR="raw_tiktok/${USER}"
          mkdir -p "$TARGET_DIR"

          echo "▸ دانلود ${MAX} ویدیو از @${USER} با پروکسی ${PROXY_URL}"

          set +e
          yt-dlp --verbose \
            --proxy "$PROXY_URL" \
            -f "bestvideo+bestaudio/best" \
            --merge-output-format mp4 \
            --output "${TARGET_DIR}/%(id)s.%(ext)s" \
            --no-playlist-reverse \
            --playlist-end "${MAX}" \
            --extractor-args "tiktok:no_watermark=1" \
            --user-agent "Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/16.0 Mobile/15E148 Safari/604.1" \
            "https://www.tiktok.com/@${USER}" 2>&1 | tee /tmp/tiktok.log
          RES=$?
          set -e

          DL_COUNT=$(find "$TARGET_DIR" -name "*.mp4" | wc -l)
          echo "📊 دانلود شده: $DL_COUNT ویدیو"

          if [ $DL_COUNT -eq 0 ]; then
            echo "❌ شکست. ۲۰ خط آخر لاگ:"
            tail -20 /tmp/tiktok.log
            echo "⚠️ ممکن است اکانت خصوصی باشد یا آی‌پی پروکسی مسدود. لاگ کامل در /tmp/tiktok.log"
          fi

      - name: 📤 Push فایل‌ها (در صورت وجود)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          mkdir -p raw_tiktok
          if [ ! -f raw_tiktok/README.md ]; then
            echo "# ویدیوهای تیک‌تاک" > raw_tiktok/README.md
          fi
          git add raw_tiktok/
          if ! git diff --cached --quiet; then
            COUNT=$(find raw_tiktok -name '*.mp4' | wc -l)
            git commit -m "🎵 تیک‌تاک @${{ github.event.inputs.tiktok_user }} ($COUNT ویدیو)"
            git pull --rebase origin main 2>/dev/null || true
            git push origin main
          else
            echo "هیچ تغییری برای commit وجود ندارد."
          fi

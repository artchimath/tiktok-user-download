name: “🎵 TikTok Downloader – Enterprise Stable Edition”

on:

workflow_dispatch:

inputs:

tiktok_user:

description: “نام کاربری تیک‌تاک”

required: true

type: string

max_videos:

description: “تعداد ویدیو”

required: true

default: “5”

type: choice

options: [“1”,“3”,“5”,“10”,“20”]

proxy:

description: “Proxy (Optional)”

required: false

default: “”

permissions:

contents: write

env:

PYTHONUNBUFFERED: “1”

FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

tiktok:

runs-on: ubuntu-latest

timeout-minutes: 30

steps:

uses: actions/checkout@v4

name: Install Dependencies

run: |

sudo apt-get update -qq

sudo apt-get install -y ffmpeg curl python3-pip

pip3 install yt-dlp “curl_cffi==0.5.10” brotli || true

name: Configure Proxy
id: proxy

run: |

if [ -n “${{ github.event.inputs.proxy }}” ]; then

echo "proxy_arg=–proxy 

“https://www.tiktok.com/@${USERNAME}”

name: Commit & Push
run: |

git config user.name “github-actions”

git config user.email “github-actions@github.com”

git add output/tiktok/

git commit -m “TikTok update” || exit 0

git pull --rebase || true

git push

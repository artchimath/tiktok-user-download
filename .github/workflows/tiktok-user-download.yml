else

echo “proxy_arg=” >> $GITHUB_OUTPUT

fi

name: Download Videos
env:

USERNAME: ${{ github.event.inputs.tiktok_user }}

MAX: ${{ github.event.inputs.max_videos }}

PROXY: ${{ steps.proxy.outputs.proxy_arg }}

run: |

mkdir -p output/tiktok/${USERNAME}

cd output/tiktok/${USERNAME}

impersonation detection
IMP=“”

if yt-dlp --list-impersonate-targets | grep -q chrome; then

IMP=“–impersonate chrome”

fi

yt-dlp \

-f “bestvideo+bestaudio/best” \

–merge-output-format mp4 \

–playlist-end “$MAX” \

–write-thumbnail \

–convert-thumbnails jpg \


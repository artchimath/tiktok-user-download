name: "🎵 TikTok Downloader (Fixed - Original Working Settings)"

on:
  workflow_dispatch:
    inputs:
      tiktok_user:
        description: '👤 نام کاربری (بدون @)'
        required: false
        type: string
      max_videos:
        description: '🔢 تعداد ویدیو (حداکثر ۲۰)'
        required: false
        default: '10'
        type: choice
        options: ['1', '3', '5', '10', '15', '20']
      single_url:
        description: '🔗 لینک یک ویدیو'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  tiktok-download:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: 🔧 نصب ابزارها
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg curl python3-pip
          pip3 install -q yt-dlp

      - name: 🛡️ راه‌اندازی WARP
        run: |
          docker run -d --name warp --restart=always \
            -p 1080:1080 --cap-add NET_ADMIN \
            -e WARP_ENABLE_WARP=yes \
            caomingjun/warp
          sleep 25
          if curl -x socks5h://127.0.0.1:1080 -s --max-time 10 https://www.tiktok.com > /dev/null; then
            echo "WARP_READY=true" >> $GITHUB_ENV
            echo "✅ WARP فعال است"
          else
            echo "WARP_READY=false" >> $GITHUB_ENV
            echo "⚠️ ادامه بدون پروکسی"
          fi

      - name: 📥 دانلود ویدیوهای کاربر (تنظیمات اصلی جواب‌داده)
        if: github.event.inputs.tiktok_user != ''
        env:
          USER: ${{ github.event.inputs.tiktok_user }}
          MAX: ${{ github.event.inputs.max_videos }}
        run: |
          set -euo pipefail
          PROXY=""
          [ "${WARP_READY:-false}" = "true" ] && PROXY="--proxy socks5://127.0.0.1:1080"

          TARGET_DIR="raw_tiktok/${USER}"
          mkdir -p "$TARGET_DIR"

          echo "▸ شروع دانلود ${MAX} ویدیوی آخر @${USER} ..."

          set +e
          yt-dlp --verbose \
            $PROXY \
            -f "bestvideo+bestaudio/best" \
            --merge-output-format mp4 \
            --output "${TARGET_DIR}/%(id)s.%(ext)s" \
            --no-write-thumbnail \
            --no-playlist-reverse \
            --playlist-end "${MAX}" \
            --extractor-args "tiktok:no_watermark=1;api_hostname=api16-normal-c-useast1a.tiktokv.com" \
            --user-agent "Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/16.0 Mobile/15E148 Safari/604.1" \
            "https://www.tiktok.com/@${USER}" 2>&1 | tee /tmp/tiktok-user.log
          EXIT=$?
          set -e

          DL_COUNT=$(find "$TARGET_DIR" -name "*.mp4" | wc -l)
          echo "📊 تعداد فایل‌های mp4 دریافت‌شده: ${DL_COUNT}"

          if [ $EXIT -ne 0 ]; then
            echo "⚠️ خروج با کد خطا ($EXIT). ۲۰ خط آخر لاگ:"
            tail -20 /tmp/tiktok-user.log
            if [ $DL_COUNT -eq 0 ]; then
              echo "❌ هیچ ویدیویی دانلود نشد. دلایل احتمالی:"
              echo "   - حساب کاربری خصوصی است"
              echo "   - نام کاربری اشتباه است"
              echo "   - آی‌پی توسط تیک‌تاک مسدود شده (حتی با WARP)"
              echo "   - لطفاً با VPN اجرا کنید یا نام کاربری را بررسی کنید."
            fi
          else
            echo "✅ دانلود کامل شد."
          fi

      - name: 📥 دانلود ویدیوی تکی (تنظیمات اصلی)
        if: github.event.inputs.single_url != ''
        env:
          SINGLE_URL: ${{ github.event.inputs.single_url }}
        run: |
          set -euo pipefail
          PROXY=""
          [ "${WARP_READY:-false}" = "true" ] && PROXY="--proxy socks5://127.0.0.1:1080"

          TARGET_DIR="raw_tiktok/single"
          mkdir -p "$TARGET_DIR"

          echo "▸ دانلود ویدیوی تکی: ${SINGLE_URL}"

          set +e
          yt-dlp --verbose \
            $PROXY \
            -f "bestvideo+bestaudio/best" \
            --merge-output-format mp4 \
            --output "${TARGET_DIR}/%(id)s.%(ext)s" \
            --no-write-thumbnail \
            --extractor-args "tiktok:no_watermark=1;api_hostname=api16-normal-c-useast1a.tiktokv.com" \
            --user-agent "Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/16.0 Mobile/15E148 Safari/604.1" \
            "${SINGLE_URL}" 2>&1 | tee /tmp/tiktok-single.log
          EXIT=$?
          set -e

          DL_COUNT=$(find "$TARGET_DIR" -name "*.mp4" | wc -l)
          echo "📊 تعداد فایل‌های mp4: ${DL_COUNT}"
          if [ $EXIT -ne 0 ]; then
            echo "⚠️ خطا در دانلود تکی. ۲۰ خط آخر لاگ:"
            tail -20 /tmp/tiktok-single.log
          fi

      - name: 📤 Push فایل‌ها به مخزن (تضمینی)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
          # اطمینان از اینکه پوشه raw_tiktok وجود دارد
          mkdir -p raw_tiktok
          if [ ! -f raw_tiktok/README.md ]; then
            echo "# ویدیوهای تیک‌تاک" > raw_tiktok/README.md
          fi

          git add -f raw_tiktok/
          if ! git diff --cached --quiet; then
            git commit -m "🎵 به‌روزرسانی raw_tiktok (فایل‌ها: $(find raw_tiktok -name '*.mp4' | wc -l) ویدیو)"
            git pull --rebase origin main 2>/dev/null || true
            git push origin main
          else
            echo "هیچ تغییری برای commit وجود ندارد."
          fi

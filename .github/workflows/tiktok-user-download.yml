name: "🎵 TikTok Downloader – Diagnostic"

on:
  workflow_dispatch:
    inputs:
      tiktok_user:
        description: '👤 نام کاربری تیک‌تاک (برای تست ابتدا tiktok را امتحان کنید)'
        required: true
        type: string
      max_videos:
        description: '🔢 تعداد ویدیوها (حداکثر ۲۰)'
        required: true
        default: '3'
        type: choice
        options: ['1', '3', '5', '10', '20']
      custom_proxy:
        description: '🌐 پروکسی دستی (مثال socks5://user:pass@1.2.3.4:1080)'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  diagnostic-tiktok:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 نصب yt-dlp
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg curl
          pip3 install -q yt-dlp

      - name: 🛡️ تنظیم پروکسی
        run: |
          if [ -n "$CUSTOM_PROXY" ]; then
            echo "🔹 استفاده از پروکسی دستی: $CUSTOM_PROXY"
            echo "PROXY_ARG=--proxy $CUSTOM_PROXY" >> $GITHUB_ENV
          else
            docker run -d --name warp --restart=always \
              -p 1080:1080 --cap-add NET_ADMIN \
              -e WARP_ENABLE_WARP=yes \
              caomingjun/warp
            sleep 25
            if curl -x socks5h://127.0.0.1:1080 -s --max-time 10 https://www.tiktok.com > /dev/null; then
              echo "✅ WARP فعال"
              echo "PROXY_ARG=--proxy socks5://127.0.0.1:1080" >> $GITHUB_ENV
            else
              echo "⚠️ WARP کار نمی‌کند – تلاش بدون پروکسی"
              echo "PROXY_ARG=--no-proxy" >> $GITHUB_ENV
            fi
          fi
        env:
          CUSTOM_PROXY: ${{ github.event.inputs.custom_proxy }}

      - name: 🔍 اجرای تست با چند استراتژی
        env:
          USER: ${{ github.event.inputs.tiktok_user }}
          MAX: ${{ github.event.inputs.max_videos }}
        run: |
          set -euo pipefail
          TARGET_DIR="raw_tiktok/${USER}"
          mkdir -p "$TARGET_DIR"

          # پاک‌سازی لاگ‌های قبلی
          echo "" > "$TARGET_DIR/debug.txt"

          # استراتژی‌ها
          # 1: no_watermark + UA آیفون
          echo "========== استراتژی ۱ (no_watermark + UA آیفون) ==========" | tee -a "$TARGET_DIR/debug.txt"
          set +e
          yt-dlp --verbose \
            ${PROXY_ARG} \
            -f "bestvideo+bestaudio/best" \
            --merge-output-format mp4 \
            --output "${TARGET_DIR}/%(id)s.%(ext)s" \
            --no-playlist-reverse \
            --playlist-end "${MAX}" \
            --extractor-args "tiktok:no_watermark=1;api_hostname=api16-normal-c-useast1a.tiktokv.com" \
            --user-agent "Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/16.0 Mobile/15E148 Safari/604.1" \
            "https://www.tiktok.com/@${USER}" 2>&1 | tee -a "$TARGET_DIR/debug.txt"
          RES1=$?
          set -e
          echo "خروجی استراتژی ۱: $RES1" | tee -a "$TARGET_DIR/debug.txt"

          # شمارش
          C1=$(find "$TARGET_DIR" -name "*.mp4" | wc -l)
          [ $C1 -gt 0 ] && { echo "✅ استراتژی ۱ موفق بود ($C1 ویدیو)."; exit 0; }

          # 2: بدون no_watermark + UA اندروید
          echo "========== استراتژی ۲ (بدون no_watermark + UA اندروید) ==========" | tee -a "$TARGET_DIR/debug.txt"
          set +e
          yt-dlp --verbose \
            ${PROXY_ARG} \
            -f "bestvideo+bestaudio/best" \
            --merge-output-format mp4 \
            --output "${TARGET_DIR}/%(id)s.%(ext)s" \
            --no-playlist-reverse \
            --playlist-end "${MAX}" \
            --user-agent "com.zhiliaoapp.musically/2023103030 (Linux; U; Android 13; en_US; SM-S9180; Build/TP1A.220624.014)" \
            "https://www.tiktok.com/@${USER}" 2>&1 | tee -a "$TARGET_DIR/debug.txt"
          RES2=$?
          set -e
          echo "خروجی استراتژی ۲: $RES2" | tee -a "$TARGET_DIR/debug.txt"
          C2=$(find "$TARGET_DIR" -name "*.mp4" | wc -l)
          [ $C2 -gt 0 ] && { echo "✅ استراتژی ۲ موفق بود ($C2 ویدیو)."; exit 0; }

          # 3: بدون پروکسی، با UA آیفون و api_hostname دیگر
          echo "========== استراتژی ۳ (بدون پروکسی + api_hostname دیگر) ==========" | tee -a "$TARGET_DIR/debug.txt"
          set +e
          yt-dlp --verbose \
            --no-proxy \
            -f "bestvideo+bestaudio/best" \
            --merge-output-format mp4 \
            --output "${TARGET_DIR}/%(id)s.%(ext)s" \
            --no-playlist-reverse \
            --playlist-end "${MAX}" \
            --extractor-args "tiktok:no_watermark=1;api_hostname=api-h2.tiktokv.com" \
            --user-agent "Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/16.0 Mobile/15E148 Safari/604.1" \
            "https://www.tiktok.com/@${USER}" 2>&1 | tee -a "$TARGET_DIR/debug.txt"
          RES3=$?
          set -e
          echo "خروجی استراتژی ۳: $RES3" | tee -a "$TARGET_DIR/debug.txt"
          C3=$(find "$TARGET_DIR" -name "*.mp4" | wc -l)

          if [ $C3 -gt 0 ]; then
            echo "✅ استراتژی ۳ موفق بود ($C3 ویدیو)."
          else
            echo "❌ هیچ ویدیویی دانلود نشد. دلایل احتمالی:"
            echo "   - اکانت خصوصی است (با @tiktok تست کنید)"
            echo "   - آی‌پی گیت‌هاب مسدود است (از پروکسی دستی استفاده کنید)"
            echo "   - نام کاربری اشتباه است"
            echo "لاگ کامل در فایل raw_tiktok/${USER}/debug.txt ذخیره شد."
            echo "لاگ کامل در فایل debug.txt ذخیره شد." >> "$TARGET_DIR/debug.txt"
          fi

      - name: 📤 Push نتایج و لاگ‌ها
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add raw_tiktok/  2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "🎵 تست تیک‌تاک @${{ github.event.inputs.tiktok_user }}"
            git pull --rebase origin main 2>/dev/null || true
            git push origin main
          else
            echo "بدون تغییر"
          fi

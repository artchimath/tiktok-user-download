name: "🎵 TikTok Downloader (Multi-Strategy)"

on:
  workflow_dispatch:
    inputs:
      tiktok_user:
        description: '👤 نام کاربری (برای اکانت عمومی)'
        required: false
        type: string
      max_videos:
        description: '🔢 تعداد ویدیو (حداکثر ۲۰)'
        required: false
        default: '10'
        type: choice
        options: ['1', '3', '5', '10', '15', '20']
      single_url:
        description: '🔗 لینک یک ویدیو'
        required: false
        type: string
      custom_proxy:
        description: '🌐 پروکسی دستی (مثال: http://user:pass@ip:port)'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  tiktok-download:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: 🔧 نصب ابزارها
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg curl python3-pip
          pip3 install -q yt-dlp

      - name: 🛡️ تنظیم پروکسی
        run: |
          if [ -n "$CUSTOM_PROXY" ]; then
            echo "PROXY_ARG=--proxy $CUSTOM_PROXY" >> $GITHUB_ENV
            echo "🔹 استفاده از پروکسی دستی"
          else
            # راه‌اندازی WARP
            docker run -d --name warp --restart=always \
              -p 1080:1080 --cap-add NET_ADMIN \
              -e WARP_ENABLE_WARP=yes \
              caomingjun/warp
            sleep 25
            if curl -x socks5h://127.0.0.1:1080 -s --max-time 10 https://www.tiktok.com > /dev/null; then
              echo "PROXY_ARG=--proxy socks5://127.0.0.1:1080" >> $GITHUB_ENV
              echo "✅ WARP فعال"
            else
              echo "PROXY_ARG=--no-proxy" >> $GITHUB_ENV
              echo "⚠️ WARP در دسترس نیست"
            fi
          fi
        env:
          CUSTOM_PROXY: ${{ github.event.inputs.custom_proxy }}

      - name: 📥 دانلود کاربر (با چندین استراتژی)
        if: github.event.inputs.tiktok_user != ''
        env:
          USER: ${{ github.event.inputs.tiktok_user }}
          MAX: ${{ github.event.inputs.max_videos }}
        run: |
          set -euo pipefail
          TARGET_DIR="raw_tiktok/${USER}"
          mkdir -p "$TARGET_DIR"

          # لیست user-agent و extractor-args مختلف
          UA_MOBILE="Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/16.0 Mobile/15E148 Safari/604.1"
          UA_ANDROID="com.zhiliaoapp.musically/2023103030 (Linux; U; Android 13; en_US; SM-S9180; Build/TP1A.220624.014; Cronet/TTNetVersion:6f6f6f6f 2023-10-30)"

          echo "▸ تلاش ۱: پروکسی + no_watermark + UA آیفون"
          set +e
          yt-dlp --verbose \
            $PROXY_ARG \
            -f "bestvideo+bestaudio/best" \
            --merge-output-format mp4 \
            --output "${TARGET_DIR}/%(id)s.%(ext)s" \
            --no-playlist-reverse \
            --playlist-end "${MAX}" \
            --extractor-args "tiktok:no_watermark=1;api_hostname=api16-normal-c-useast1a.tiktokv.com" \
            --user-agent "$UA_MOBILE" \
            "https://www.tiktok.com/@${USER}" 2>&1 | tee /tmp/log1
          RES1=$?
          set -e

          DL_COUNT=$(find "$TARGET_DIR" -name "*.mp4" | wc -l)
          echo "📊 بعد از تلاش ۱: ${DL_COUNT} ویدیو"

          if [ $DL_COUNT -eq 0 ]; then
            echo "▸ تلاش ۲: بدون no_watermark + UA آیفون کامل"
            set +e
            yt-dlp --verbose \
              $PROXY_ARG \
              -f "bestvideo+bestaudio/best" \
              --merge-output-format mp4 \
              --output "${TARGET_DIR}/%(id)s.%(ext)s" \
              --no-playlist-reverse \
              --playlist-end "${MAX}" \
              --user-agent "$UA_MOBILE" \
              "https://www.tiktok.com/@${USER}" 2>&1 | tee /tmp/log2
            set -e
            DL_COUNT=$(find "$TARGET_DIR" -name "*.mp4" | wc -l)
            echo "📊 بعد از تلاش ۲: ${DL_COUNT} ویدیو"
          fi

          if [ $DL_COUNT -eq 0 ]; then
            echo "▸ تلاش ۳: بدون پروکسی، با UA اندروید"
            set +e
            yt-dlp --verbose \
              --no-proxy \
              -f "bestvideo+bestaudio/best" \
              --merge-output-format mp4 \
              --output "${TARGET_DIR}/%(id)s.%(ext)s" \
              --no-playlist-reverse \
              --playlist-end "${MAX}" \
              --user-agent "$UA_ANDROID" \
              "https://www.tiktok.com/@${USER}" 2>&1 | tee /tmp/log3
            set -e
            DL_COUNT=$(find "$TARGET_DIR" -name "*.mp4" | wc -l)
            echo "📊 بعد از تلاش ۳: ${DL_COUNT} ویدیو"
          fi

          if [ $DL_COUNT -eq 0 ]; then
            echo "❌ هیچ ویدیویی دریافت نشد. این یعنی:"
            echo "   - اکانت خصوصی است، یا"
            echo "   - آی‌پی کاملاً بلاک شده (حتی با چند روش)"
            echo "پیشنهاد: تست با اکانت عمومی @tiktok برای اطمینان از تنظیمات"
          fi

      - name: 📥 دانلود ویدیوی تکی
        if: github.event.inputs.single_url != ''
        env:
          SINGLE_URL: ${{ github.event.inputs.single_url }}
        run: |
          TARGET_DIR="raw_tiktok/single"
          mkdir -p "$TARGET_DIR"
          yt-dlp --verbose \
            $PROXY_ARG \
            -f "bestvideo+bestaudio/best" \
            --merge-output-format mp4 \
            --output "${TARGET_DIR}/%(id)s.%(ext)s" \
            --extractor-args "tiktok:no_watermark=1;api_hostname=api16-normal-c-useast1a.tiktokv.com" \
            --user-agent "Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/16.0 Mobile/15E148 Safari/604.1" \
            "${SINGLE_URL}" 2>&1 | tee /tmp/tiktok-single.log || echo "خطا در دانلود تکی"

      - name: 📤 Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          mkdir -p raw_tiktok
          git add raw_tiktok/  2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "🎵 آپلود تیک‌تاک"
            git pull --rebase origin main 2>/dev/null || true
            git push origin main
          else
            echo "بدون تغییر"
          fi

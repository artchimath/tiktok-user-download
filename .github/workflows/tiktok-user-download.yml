name: "🎵 TikTok Downloader (Final Stable)"

on:
  workflow_dispatch:
    inputs:
      tiktok_user:
        description: '👤 نام کاربری (بدون @)'
        required: false
        type: string
      max_videos:
        description: '🔢 تعداد ویدیو (حداکثر ۲۰)'
        required: false
        default: '10'
        type: choice
        options: ['1', '3', '5', '10', '15', '20']
      single_url:
        description: '🔗 لینک یک ویدیو'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  tiktok-download:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: 🔧 نصب ابزارها
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg curl python3-pip
          pip3 install -q yt-dlp

      - name: 🛡️ راه‌اندازی WARP
        run: |
          docker run -d --name warp --restart=always \
            -p 1080:1080 --cap-add NET_ADMIN \
            -e WARP_ENABLE_WARP=yes \
            caomingjun/warp
          sleep 25
          if curl -x socks5h://127.0.0.1:1080 -s --max-time 10 https://www.tiktok.com > /dev/null; then
            echo "WARP_READY=true" >> $GITHUB_ENV
            echo "✅ WARP فعال است"
          else
            echo "WARP_READY=false" >> $GITHUB_ENV
            echo "⚠️ ادامه بدون پروکسی"
          fi

      - name: 📥 دانلود ویدیوهای کاربر
        if: github.event.inputs.tiktok_user != ''
        env:
          USER: ${{ github.event.inputs.tiktok_user }}
          MAX: ${{ github.event.inputs.max_videos }}
        run: |
          set -eu
          PROXY=""
          [ "${WARP_READY:-false}" = "true" ] && PROXY="--proxy socks5://127.0.0.1:1080"

          TARGET_DIR="raw_tiktok/${USER}"
          mkdir -p "$TARGET_DIR"

          echo "▸ دانلود ${MAX} ویدیوی آخر @${USER} ..."

          # اجرای yt-dlp با continue on error
          set +e
          yt-dlp --verbose \
            $PROXY \
            -f "bestvideo+bestaudio/best" \
            --merge-output-format mp4 \
            --output "${TARGET_DIR}/%(id)s.%(ext)s" \
            --no-write-thumbnail \
            --no-playlist-reverse \
            --playlist-end "${MAX}" \
            --extractor-args "tiktok:no_watermark=1;api_hostname=api16-normal-c-useast1a.tiktokv.com" \
            --user-agent "Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/16.0 Mobile/15E148 Safari/604.1" \
            "https://www.tiktok.com/@${USER}" 2>&1 | tee /tmp/tiktok-user.log
          EXIT=$?
          set -e

          if [ $EXIT -ne 0 ]; then
            echo "⚠️ خروج با خطا (کد $EXIT) – ۲۰ خط آخر لاگ:"
            tail -20 /tmp/tiktok-user.log
          else
            echo "✅ دانلود کاربر به پایان رسید."
          fi
          echo "📊 تعداد فایل‌های mp4: $(find "$TARGET_DIR" -name '*.mp4' | wc -l)"

      - name: 📥 دانلود ویدیوی تکی
        if: github.event.inputs.single_url != ''
        env:
          SINGLE_URL: ${{ github.event.inputs.single_url }}
        run: |
          set -eu
          PROXY=""
          [ "${WARP_READY:-false}" = "true" ] && PROXY="--proxy socks5://127.0.0.1:1080"

          TARGET_DIR="raw_tiktok/single"
          mkdir -p "$TARGET_DIR"

          echo "▸ دانلود ویدیوی تکی: ${SINGLE_URL}"

          set +e
          yt-dlp --verbose \
            $PROXY \
            -f "bestvideo+bestaudio/best" \
            --merge-output-format mp4 \
            --output "${TARGET_DIR}/%(id)s.%(ext)s" \
            --no-write-thumbnail \
            --extractor-args "tiktok:no_watermark=1;api_hostname=api16-normal-c-useast1a.tiktokv.com" \
            --user-agent "Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/16.0 Mobile/15E148 Safari/604.1" \
            "${SINGLE_URL}" 2>&1 | tee /tmp/tiktok-single.log
          EXIT=$?
          set -e

          if [ $EXIT -ne 0 ]; then
            echo "⚠️ خروج با خطا (کد $EXIT) – ۲۰ خط آخر لاگ:"
            tail -20 /tmp/tiktok-single.log
          else
            echo "✅ دانلود تکی موفق."
          fi

      - name: 📤 Push فایل‌ها به مخزن
        run: |
          set -x
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if [ -d "raw_tiktok" ] && [ "$(find raw_tiktok -type f | wc -l)" -gt 0 ]; then
            git add raw_tiktok/
            if ! git diff --cached --quiet; then
              git commit -m "🎵 آپلود ویدیوهای تیک‌تاک"
              git pull --rebase origin main 2>/dev/null || true
              git push origin main
            else
              echo "هیچ تغییری برای commit وجود ندارد."
            fi
          else
            echo "پوشه raw_tiktok خالی است. یک فایل placeholder اضافه می‌شود."
            mkdir -p raw_tiktok
            echo "هنوز ویدیویی دانلود نشده است." > raw_tiktok/PLACEHOLDER.md
            git add raw_tiktok/
            git commit -m "افزودن placeholder"
            git pull --rebase origin main 2>/dev/null || true
            git push origin main
          fi

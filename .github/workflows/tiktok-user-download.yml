name: "🎵 TikTok Downloader (Guaranteed Push)"

on:
  workflow_dispatch:
    inputs:
      tiktok_user:
        description: '👤 نام کاربری (بدون @)'
        required: false
        type: string
      max_videos:
        description: '🔢 تعداد ویدیو (حداکثر ۲۰)'
        required: false
        default: '10'
        type: choice
        options: ['1', '3', '5', '10', '15', '20']
      single_url:
        description: '🔗 لینک یک ویدیو'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  tiktok-download:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: 🔧 نصب ابزارها
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg curl python3-pip
          pip3 install -q yt-dlp

      - name: 🛡️ راه‌اندازی WARP
        run: |
          docker run -d --name warp --restart=always \
            -p 1080:1080 --cap-add NET_ADMIN \
            -e WARP_ENABLE_WARP=yes \
            caomingjun/warp
          sleep 25
          [ "$(curl -x socks5h://127.0.0.1:1080 -s --max-time 10 -o /dev/null -w '%{http_code}' https://www.tiktok.com)" = "200" ] && echo "WARP_READY=true" >> $GITHUB_ENV || echo "WARP_READY=false" >> $GITHUB_ENV

      - name: 📥 دانلود کاربر (در صورت وجود)
        if: github.event.inputs.tiktok_user != ''
        env:
          USER: ${{ github.event.inputs.tiktok_user }}
          MAX: ${{ github.event.inputs.max_videos }}
        run: |
          set -euo pipefail
          PROXY=""
          [ "${WARP_READY:-false}" = "true" ] && PROXY="--proxy socks5://127.0.0.1:1080"

          TARGET_DIR="raw_tiktok/${USER}"
          mkdir -p "$TARGET_DIR"
          echo "این پوشه برای ویدیوهای @${USER} ایجاد شده." > "$TARGET_DIR/PLACEHOLDER.md"

          echo "▸ دانلود ${MAX} ویدیو از @${USER} ..."
          set +e
          yt-dlp --verbose \
            $PROXY \
            -f "bestvideo+bestaudio/best" \
            --merge-output-format mp4 \
            --output "${TARGET_DIR}/%(id)s.%(ext)s" \
            --no-write-thumbnail \
            --no-playlist-reverse \
            --playlist-end "${MAX}" \
            --extractor-args "tiktok:no_watermark=1;api_hostname=api16-normal-c-useast1a.tiktokv.com;app_version=31.3.2" \
            --user-agent "com.zhiliaoapp.musically/2023103030 (Linux; U; Android 13; en_US; SM-S9180; Build/TP1A.220624.014; Cronet/TTNetVersion:6f6f6f6f 2023-10-30)" \
            "https://www.tiktok.com/@${USER}" 2>&1 | tee /tmp/tiktok-user.log
          EXIT=$?
          set -e

          DL_COUNT=$(find "$TARGET_DIR" -name "*.mp4" | wc -l)
          echo "📊 تعداد فایل‌های mp4 دریافت شده: ${DL_COUNT}"
          if [ $EXIT -ne 0 ]; then
            echo "⚠️ خروج با خطا. ۲۰ خط آخر لاگ:"
            tail -20 /tmp/tiktok-user.log
          fi

      - name: 📥 دانلود لینک تکی
        if: github.event.inputs.single_url != ''
        env:
          SINGLE_URL: ${{ github.event.inputs.single_url }}
        run: |
          set -euo pipefail
          PROXY=""
          [ "${WARP_READY:-false}" = "true" ] && PROXY="--proxy socks5://127.0.0.1:1080"
          TARGET_DIR="raw_tiktok/single"
          mkdir -p "$TARGET_DIR"
          echo "این پوشه برای لینک‌های تک ویدیو ایجاد شده." > "$TARGET_DIR/PLACEHOLDER.md"

          set +e
          yt-dlp --verbose \
            $PROXY \
            -f "bestvideo+bestaudio/best" \
            --merge-output-format mp4 \
            --output "${TARGET_DIR}/%(id)s.%(ext)s" \
            --no-write-thumbnail \
            --extractor-args "tiktok:no_watermark=1;api_hostname=api16-normal-c-useast1a.tiktokv.com;app_version=31.3.2" \
            --user-agent "com.zhiliaoapp.musically/2023103030 (Linux; U; Android 13; en_US; SM-S9180; Build/TP1A.220624.014; Cronet/TTNetVersion:6f6f6f6f 2023-10-30)" \
            "${SINGLE_URL}" 2>&1 | tee /tmp/tiktok-single.log
          EXIT=$?
          set -e
          DL_COUNT=$(find "$TARGET_DIR" -name "*.mp4" | wc -l)
          echo "📊 تعداد فایل‌های mp4: ${DL_COUNT}"
          if [ $EXIT -ne 0 ]; then
            echo "⚠️ خطا در دانلود تکی. ۲۰ خط آخر لاگ:"
            tail -20 /tmp/tiktok-single.log
          fi

      - name: 📤 Push فایل‌ها
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          if [ -d "raw_tiktok" ]; then
            git add raw_tiktok/
            if ! git diff --cached --quiet; then
              git commit -m "🎵 به‌روزرسانی raw_tiktok"
              git pull --rebase origin main 2>/dev/null || true
              git push origin main
            else
              echo "هیچ فایل جدیدی برای commit وجود ندارد."
            fi
          else
            mkdir -p raw_tiktok
            echo "پوشه هنوز خالی است." > raw_tiktok/README.md
            git add raw_tiktok/
            git commit -m "ایجاد پوشه raw_tiktok"
            git push origin main
          fi

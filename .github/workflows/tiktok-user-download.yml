name: "🎵 TikTok Downloader – Archive Ready"

on:
  workflow_dispatch:
    inputs:
      tiktok_user:
        description: '👤 نام کاربری تیک‌تاک'
        required: true
        type: string
      max_videos:
        description: '🔢 تعداد ویدیوها'
        required: true
        default: '5'
        type: choice
        options: ['1', '3', '5', '10', '20']
      custom_proxy:
        description: '🌐 پروکسی دستی (اختیاری)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  tiktok-download:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 نصب ابزارها
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg curl python3-pip
          pip3 install -U yt-dlp

      - name: 🛡️ تنظیم پروکسی (اختیاری)
        run: |
          if [ -n "${CUSTOM_PROXY:-}" ]; then
            echo "PROXY_URL=$CUSTOM_PROXY" >> $GITHUB_ENV
            echo "✅ پروکسی تنظیم شد"
          else
            echo "PROXY_URL=" >> $GITHUB_ENV
            echo "ℹ️ اجرای بدون پروکسی"
          fi
        env:
          CUSTOM_PROXY: ${{ github.event.inputs.custom_proxy }}

      - name: 📥 دانلود و آرشیو روزانه
        env:
          USER: ${{ github.event.inputs.tiktok_user }}
          MAX: ${{ github.event.inputs.max_videos }}
        run: |
          set -euo pipefail

          TODAY=$(date +%F)
          BASE_DIR="raw_tiktok/${USER}/${TODAY}"
          mkdir -p "$BASE_DIR"

          echo "▸ کاربر: @$USER"
          echo "▸ تاریخ آرشیو: $TODAY"
          echo "▸ تعداد: $MAX"
          echo "▸ پروکسی: ${PROXY_URL:-بدون پروکسی}"

          PROXY_ARG=""
          if [ -n "${PROXY_URL:-}" ]; then
            PROXY_ARG="--proxy ${PROXY_URL}"
          fi

          yt-dlp --verbose \
            $PROXY_ARG \
            -f "bv*+ba/b" \
            --merge-output-format mp4 \
            --write-description \
            --write-thumbnail \
            --convert-thumbnails jpg \
            --output "${BASE_DIR}/%(id)s.%(ext)s" \
            --playlist-end "$MAX" \
            --sleep-interval 2 \
            --max-sleep-interval 5 \
            --retries 10 \
            --extractor-args "tiktok:no_watermark=1" \
            --user-agent "Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X)" \
            "https://www.tiktok.com/@${USER}/video" 2>&1 | tee /tmp/tiktok.log

          COUNT=$(find "$BASE_DIR" -name '*.mp4' | wc -l)
          echo "📊 دانلود شد: $COUNT ویدیو"

          if [ "$COUNT" -eq 0 ]; then
            echo "❌ دانلود ناموفق"
            echo "📄 آخرین لاگ:"
            tail -30 /tmp/tiktok.log
            exit 1
          fi

      - name: 📤 Push آرشیو به مخزن
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add raw_tiktok/
          if ! git diff --cached --quiet; then
            TOTAL=$(find raw_tiktok -name '*.mp4' | wc -l)
            git commit -m "📦 TikTok @$USER – آرشیو روزانه ($TOTAL ویدیو)"
            git pull --rebase origin main || true
            git push origin main
          else
            echo "ℹ️ تغییری برای Commit وجود ندارد"
          fi

name: "🎵 TikTok Downloader (Debug Push)"

on:
  workflow_dispatch:
    inputs:
      tiktok_user:
        description: '👤 نام کاربری (بدون @)'
        required: false
        type: string
      max_videos:
        description: '🔢 تعداد ویدیو (حداکثر ۲۰)'
        required: false
        default: '10'
        type: choice
        options: ['1', '3', '5', '10', '15', '20']
      single_url:
        description: '🔗 لینک یک ویدیو'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  tiktok-download:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: 🔧 نصب ابزارها
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg curl python3-pip
          pip3 install -q yt-dlp

      - name: 🛡️ راه‌اندازی WARP
        run: |
          docker run -d --name warp --restart=always \
            -p 1080:1080 --cap-add NET_ADMIN \
            -e WARP_ENABLE_WARP=yes \
            caomingjun/warp
          sleep 25
          if curl -x socks5h://127.0.0.1:1080 -s --max-time 10 https://www.tiktok.com > /dev/null; then
            echo "WARP_READY=true" >> $GITHUB_ENV
            echo "✅ WARP فعال"
          else
            echo "WARP_READY=false" >> $GITHUB_ENV
            echo "⚠️ بدون پروکسی"
          fi

      - name: 📥 دانلود کاربر
        if: github.event.inputs.tiktok_user != ''
        env:
          USER: ${{ github.event.inputs.tiktok_user }}
          MAX: ${{ github.event.inputs.max_videos }}
        run: |
          # (همان کد دانلود نسخهٔ قبلی)
          ...
      - name: 📥 دانلود تکی
        if: github.event.inputs.single_url != ''
        env:
          SINGLE_URL: ${{ github.event.inputs.single_url }}
        run: |
          # (همان کد دانلود تکی)
      - name: 📋 Push فایل‌ها
        run: |
          set -x
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          if [ -d "raw_tiktok" ] && [ "$(find raw_tiktok -type f | wc -l)" -gt 0 ]; then
            git add raw_tiktok/
            if ! git diff --cached --quiet; then
              git commit -m "🎵 افزودن ویدیوهای تیک‌تاک"
              git pull --rebase origin main 2>/dev/null || true
              git push origin main
            else
              echo "هیچ فایلی برای commit وجود ندارد"
            fi
          else
            mkdir -p raw_tiktok
            echo "هنوز ویدیویی دانلود نشده." > raw_tiktok/PLACEHOLDER.md
            git add raw_tiktok/
            git commit -m "افزودن placeholder"
            git pull --rebase origin main 2>/dev/null || true
            git push origin main
          fi
